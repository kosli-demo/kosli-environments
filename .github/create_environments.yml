name: Create Kosli Environments

on:
  workflow_call:
    secrets:
      KOSLI_API_TOKEN:
    inputs:
      kosli_host:
        description: 'Kosli host URL'
        required: true
        type: string

env:
  KOSLI_ORG:       ${{ vars.KOSLI_ORG }}
  KOSLI_HOST:      ${{ inputs.kosli_host }}
  KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
  KOSLI_DEBUG:     ${{ vars.KOSLI_DEBUG }}
  KOSLI_DRY_RUN:   ${{ vars.KOSLI_DRY_RUN }}

jobs:

  create-environment:
    needs: []
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.CLONE_PUSH_REPOS }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Create Kosli environment for staging
        run:
          kosli create environment staging
            --type server
